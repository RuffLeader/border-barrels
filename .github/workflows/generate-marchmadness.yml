name: Generate March Madness ICS

on:
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours during the tournament
  workflow_dispatch:         # manual trigger from the Actions tab

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write        # needed to commit the .ics back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install node-fetch nodemailer

      - name: Run generator
        run: node scripts/generate-marchmadness.mjs

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add marchmadness.ics marchmadness-state.json
          git diff --staged --quiet || git commit -m "chore: update marchmadness.ics [skip ci]"
          git push
